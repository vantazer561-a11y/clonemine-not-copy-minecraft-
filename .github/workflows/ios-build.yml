name: iOS Build (unsigned IPA)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned .ipa
    runs-on: macos-14
    timeout-minutes: 30        # Requirement 8.5

    env:
      SCHEME: VoxelGame

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Requirement 8.7: фиксация точной версии Xcode.
      - name: Select Xcode 15.4
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Show tool versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # PR: проверка компиляции + тесты на симуляторе (Requirement 8.2)
      - name: Run tests (PR only)
        if: github.event_name == 'pull_request'
        run: |
          xcodebuild test \
            -project VoxelGame.xcodeproj \
            -scheme "$SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO | xcpretty || exit ${PIPESTATUS[0]}

      # Сборка без подписи (Requirement 8.6)
      - name: Archive (no code signing)
        run: |
          set -o pipefail
          xcodebuild \
            -project VoxelGame.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/VoxelGame.xcarchive \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" | xcpretty || exit ${PIPESTATUS[0]}

      # Ручная упаковка неподписанного .ipa из Payload/
      - name: Package unsigned .ipa
        run: |
          APP_PATH="build/VoxelGame.xcarchive/Products/Applications/VoxelGame.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App not found at $APP_PATH"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry VoxelGame-unsigned.ipa Payload
          echo "Built unsigned IPA:"
          ls -lh VoxelGame-unsigned.ipa

      # Requirement 8.3: артефакт с хранением 30 дней
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoxelGame-unsigned-ipa
          path: VoxelGame-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
